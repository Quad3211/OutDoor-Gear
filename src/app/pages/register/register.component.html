<div class="auth-wrapper">
  <div class="auth-background" aria-hidden="true"></div>

  <div class="auth-container">
    <div class="auth-card glass-panel">
      <div class="brand-header">
        <span class="brand-icon" aria-hidden="true">⛰️</span>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">
          Join us for faster checkout and exclusive deals.
        </p>
      </div>

      <div
        *ngIf="errorMessage"
        class="error-msg"
        role="alert"
        aria-live="assertive"
      >
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
        <div class="name-row">
          <div class="form-group flex-1">
            <label for="firstName">First Name</label>
            <div class="input-icon-wrapper">
              <span class="input-icon" aria-hidden="true">👤</span>
              <input
                type="text"
                id="firstName"
                name="firstName"
                [(ngModel)]="model.firstName"
                required
                autocomplete="given-name"
                class="form-control"
                placeholder="Jane"
              />
            </div>
          </div>
          <div class="form-group flex-1">
            <label for="lastName">Last Name</label>
            <div class="input-icon-wrapper">
              <input
                type="text"
                id="lastName"
                name="lastName"
                [(ngModel)]="model.lastName"
                autocomplete="family-name"
                class="form-control"
                placeholder="Doe"
                style="padding-left: 1rem"
              />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-icon-wrapper">
            <span class="input-icon" aria-hidden="true">✉️</span>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="model.email"
              required
              autocomplete="email"
              class="form-control"
              placeholder="jane@example.com"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrapper">
            <span class="input-icon" aria-hidden="true">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="model.password"
              required
              minlength="6"
              autocomplete="new-password"
              class="form-control"
              placeholder="Min. 6 characters"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="phone"
            >Phone Number <span class="optional">(Optional)</span></label
          >
          <div class="input-icon-wrapper">
            <span class="input-icon" aria-hidden="true">📞</span>
            <input
              type="tel"
              id="phone"
              name="phone"
              [(ngModel)]="model.phone"
              autocomplete="tel"
              class="form-control"
              placeholder="(876) 555-0198"
            />
          </div>
        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn btn-primary auth-submit"
            [disabled]="loading || registerForm.invalid"
          >
            <span *ngIf="!loading">Create Account</span>
            <span *ngIf="loading" class="spinner"></span>
            <span *ngIf="loading">Creating...</span>
          </button>
        </div>
      </form>

      <div class="auth-footer">
        <p>
          Already have an account?
          <a routerLink="/login" class="auth-link">Log in here</a>
        </p>
      </div>
    </div>
  </div>
</div>
