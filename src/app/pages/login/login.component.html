<div class="auth-wrapper">
  <div class="auth-background" aria-hidden="true"></div>

  <div class="auth-container">
    <div class="auth-card glass-panel">
      <div class="brand-header">
        <span class="brand-icon" aria-hidden="true">⛰️</span>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Log in to continue your adventure.</p>
      </div>

      <div
        *ngIf="errorMessage"
        class="error-msg"
        role="alert"
        aria-live="assertive"
      >
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-icon-wrapper">
            <span class="input-icon" aria-hidden="true">✉️</span>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="model.email"
              required
              autocomplete="email"
              class="form-control"
              placeholder="Enter your email address"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrapper">
            <span class="input-icon" aria-hidden="true">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="model.password"
              required
              autocomplete="current-password"
              class="form-control"
              placeholder="Enter your password"
            />
          </div>
        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn btn-primary auth-submit"
            [disabled]="loading || loginForm.invalid"
          >
            <span *ngIf="!loading">Log In</span>
            <span *ngIf="loading" class="spinner"></span>
            <span *ngIf="loading">Authenticating...</span>
          </button>
        </div>
      </form>

      <div class="auth-footer">
        <p>
          Don't have an account?
          <a routerLink="/register" class="auth-link">Create one here</a>
        </p>
      </div>
    </div>
  </div>
</div>
