<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Island Adventure Gear — Jamaica's Outdoor Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Island Adventure Gear — Jamaica's premier outdoor equipment store for hiking, camping, and climbing gear. Shop now."
    />
    <meta name="theme-color" content="#1a3d1a" />

    <!-- Security headers hint (enforced at server/deployment level) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Island Adventure Gear — Jamaica's Outdoor Store"
    />
    <meta
      property="og:description"
      content="Premium outdoor gear for hiking, camping, and climbing in Jamaica."
    />
    <meta property="og:locale" content="en_JM" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Preconnect to image CDN for performance -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
